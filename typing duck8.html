<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Duck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            background-color: #020617; /* slate-950 */
        }
        #game-container {
            background-color: #0f172a; /* slate-900 */
            border: 2px solid #334155; /* slate-700 */
            position: relative;
            width: 100%;
            height: 75vh;
            overflow: hidden;
        }
        .lane {
            position: absolute;
            width: 100%;
            height: 33.33%;
            display: flex;
            align-items: center;
            border-bottom: 2px dashed #1e293b; /* slate-800 */
        }
        #lane-top { top: 0; }
        #lane-middle { top: 33.33%; }
        #lane-bottom { top: 66.66%; border-bottom: none; }

        .word {
            position: absolute;
            width: 160px;
            height: 115px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Adjust text position based on animal */
        .duck-text { padding-top: 58px; }
        .rabbit-text { padding-top: 55px; }
        .dog-text { color: #dc2626; padding-top: 25px; }
        .elephant-text { padding-top: 10px; }
        .lion-text { padding-top: 45px; }

        .word-text {
            display: inline-block;
        }
        .word.destroyed {
            animation: explode 0.3s forwards;
        }
        .correct-char {
            color: #16a34a !important;
        }
        
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        #countdown-number {
            display: inline-block;
            animation: countdownPop 1s ease-out;
        }
        @keyframes countdownPop {
            0% { transform: scale(1.6); opacity: 0; }
            30% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .register-input {
            background-color: #1e293b;
            border: 2px solid #475569;
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            width: 100%;
            text-align: center;
        }
        .register-input:focus {
            outline: none;
            border-color: #38bdf8;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl">
        <!-- Header -->
        <div class="flex justify-between items-center bg-slate-800 p-3 rounded-t-lg text-white text-center">
            <div class="text-left">
                <h1 class="text-2xl font-bold">Typing Duck</h1>

            </div>
            <div class="flex gap-6">

                    <span id="ducks-display" class="text-2xl font-bold text-emerald-400">0</span>
                </div>
                <div>
                    <span class="font-semibold">คะแนน:</span>
                    <span id="score-display" class="text-2xl font-bold text-amber-400">0</span>
                </div>
                <div>
                    <span class="font-semibold">เวลา:</span>
                    <span id="timer-display" class="text-2xl font-bold text-sky-400">90</span>
                </div>
            </div>
        </div>

        <!-- Game Container -->
        <div id="game-container">
            <div id="lane-top" class="lane"></div>
            <div id="lane-middle" class="lane"></div>
            <div id="lane-bottom" class="lane"></div>

            <!-- Overlay Screens -->
            <div id="overlay">
                <div id="register-screen" class="text-center text-white w-full max-w-sm px-6">
                    <h1 class="text-3xl font-bold mb-1">Typing Duck</h1>
                    <p class="text-slate-300 mb-6">กรุณาลงทะเบียนก่อนเริ่มเล่น</p>
                    <div class="flex flex-col gap-3">
                        <input type="text" id="reg-fullname" class="register-input" placeholder="ชื่อ-สกุล">
                        <input type="text" id="reg-studentid" class="register-input" placeholder="รหัสประจำตัว">
                        <p id="register-error" class="text-red-400 text-sm hidden">กรุณากรอกข้อมูลให้ครบทุกช่อง</p>
                        <button type="button" id="register-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-10 rounded-lg text-xl mt-2">ลงทะเบียน</button>
                    </div>
                </div>
                <div id="start-screen" class="text-center text-white hidden">
                    <p class="text-xl mb-8">ทำคะแนนให้ได้มากที่สุดใน 90 วินาที!</p>
                    <button id="start-btn" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-10 rounded-lg text-2xl">เริ่มเกม</button>
                </div>
                <div id="countdown-screen" class="text-center text-white hidden">
                    <span id="countdown-number" class="font-bold text-amber-400" style="font-size: 8rem; line-height: 1;">3</span>
                </div>
                <div id="end-screen" class="text-center text-white hidden">
                    <h1 class="text-5xl font-bold mb-2">หมดเวลา!</h1>
                    <p class="text-2xl mb-2">เป็ดที่กำจัดได้: <span id="final-ducks" class="font-bold text-emerald-400">0</span> ตัว</p>
                    <p class="text-3xl mb-6">คะแนนของคุณ: <span id="final-score" class="font-bold text-amber-400">0</span></p>
                    <button id="restart-btn" class="bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-10 rounded-lg text-2xl">เล่นอีกครั้ง</button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-slate-800 p-4 rounded-b-lg">
            <input type="text" id="input-box" class="w-full p-3 bg-slate-700 border-2 border-slate-600 text-white rounded-lg text-3xl text-center focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="..." disabled>
        </div>
    </div>

        ];

        let score = 0;
        let ducksEliminated = 0;
        let typedHighWaterMark = 0; // tracks correct keystrokes already scored for the current attempt
        let timeLeft = 90;
        let timerInterval;
        let gameLoopId;
        let activeWords = [];
        let wordPool = [];
        const GAME_SPEED = 1.1; // Speed reduced by 25% from 1.5

        function runCountdownThenStart() {
            startScreen.classList.add('hidden');
            countdownScreen.classList.remove('hidden');

            let count = 3;
            countdownNumber.textContent = count;
            countdownNumber.style.animation = 'none';
            void countdownNumber.offsetWidth; // restart animation
            countdownNumber.style.animation = '';

            const countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                    countdownNumber.style.animation = 'none';
                    void countdownNumber.offsetWidth;
                    countdownNumber.style.animation = '';
                } else {
                    clearInterval(countdownInterval);
                    countdownScreen.classList.add('hidden');
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            score = 0;
            ducksEliminated = 0;
            typedHighWaterMark = 0;
            timeLeft = 90;
            wordPool = [...words].sort(() => Math.random() - 0.5);
            
            scoreDisplay.textContent = score;
            ducksDisplay.textContent = ducksEliminated;
            timerDisplay.textContent = timeLeft;

            activeWords = [];
            Object.values(lanes).forEach(lane => lane.innerHTML = '');
            
            inputBox.disabled = false;
            inputBox.value = '';
            inputBox.focus();
            overlay.style.display = 'none';

            timerInterval = setInterval(updateTimer, 1000);
            gameLoopId = requestAnimationFrame(gameLoop);
        }
        
        function stopGame() {
            cancelAnimationFrame(gameLoopId);
            clearInterval(timerInterval);
            inputBox.disabled = true;
            finalScoreDisplay.textContent = score;
            finalDucksDisplay.textContent = ducksEliminated;
            endScreen.classList.remove('hidden');
            overlay.style.display = 'flex';
        }

        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                stopGame();
            }
        }

        function spawnWord(laneKey) {
            if (wordPool.length === 0) {
                 wordPool = [...words].sort(() => Math.random() - 0.5);
            }
            const wordText = wordPool.pop();
            const animal = animalImages[0]; // Only use duck
            
            const wordEl = document.createElement('div');
            wordEl.className = 'word';
            wordEl.classList.add(animal.class);
            wordEl.style.backgroundImage = `url('${animal.image}')`;
            wordEl.innerHTML = `<span class="word-text">${wordText.split('').map(char => `<span>${char}</span>`).join('')}</span>`;
            
            const direction = (laneKey === 'middle') ? -1 : 1;
            const startX = (direction === 1) ? -180 : gameContainer.offsetWidth;

            lanes[laneKey].appendChild(wordEl);
            activeWords.push({ element: wordEl, text: wordText, x: startX, startX: startX, direction: direction, lane: laneKey });
        }

        function gameLoop() {
            const containerWidth = gameContainer.offsetWidth;
            const SAFE_SPAWN_DISTANCE = 250;

            Object.keys(lanes).forEach(laneKey => {
                const laneWords = activeWords.filter(w => w.lane === laneKey);
                const lastWord = laneWords[laneWords.length - 1];
                let canSpawn = false;

                if (!lastWord) {
                    canSpawn = true; 
                } else {
                    const traveled = Math.abs(lastWord.x - lastWord.startX);
                    if (traveled > SAFE_SPAWN_DISTANCE) canSpawn = true;
                }
                
                if (canSpawn) {
                    spawnWord(laneKey);
                }
            });

            // Iterate over a snapshot and rebuild activeWords afterwards, instead of
            // splicing the live array mid-forEach (which skips the word that shifts
            // into the just-removed index and can make it seem to vanish early).
            const stillActive = [];
            activeWords.forEach((word) => {
                word.x += word.direction * GAME_SPEED;

                const outOfBounds = (word.direction === 1 && word.x > containerWidth) ||
                                     (word.direction === -1 && word.x < -180);

                if (outOfBounds) {
                    word.element.remove();
                    return;
                }

                const flipTransform = (word.direction === 1) ? 'scaleX(-1)' : '';
                word.element.style.transform = `translateX(${word.x}px) ${flipTransform}`;

                const textSpan = word.element.querySelector('.word-text');
                if (textSpan) {
                    textSpan.style.transform = flipTransform;
                }

                stillActive.push(word);
            });
            activeWords = stillActive;

            const typedText = inputBox.value;
            if (typedText.length > 0) {
                const isAnyWordMatching = activeWords.some(word => word.text.startsWith(typedText));
                if (!isAnyWordMatching) {
                    inputBox.value = '';
                    typedHighWaterMark = 0;
                    handleInput();
                }
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function handleInput() {
            const typedText = inputBox.value;
            
            const isPathValid = activeWords.some(word => word.text.startsWith(typedText));

            if (!isPathValid && typedText.length > 0) {
                inputBox.value = typedText.slice(0, -1);
                return;
            }

            // Award 1 point for each newly-reached correct character (a high-water mark
            // so backspacing and retyping the same ground doesn't score twice).
            if (typedText.length > typedHighWaterMark) {
                score += (typedText.length - typedHighWaterMark);
                typedHighWaterMark = typedText.length;
                scoreDisplay.textContent = score;
            }

            let completedWord = null;

            activeWords.forEach(word => {
                const spans = word.element.querySelectorAll('.word-text > span');
                if (word.text.startsWith(typedText)) {
                    for (let i = 0; i < typedText.length; i++) spans[i].classList.add('correct-char');
                    for (let i = typedText.length; i < spans.length; i++) spans[i].classList.remove('correct-char');
                } else {
                    spans.forEach(span => span.classList.remove('correct-char'));
                }

                if (typedText.length > 0 && typedText === word.text) {
                    completedWord = word;
                }
            });

            if (completedWord) {
                ducksEliminated++;
                ducksDisplay.textContent = ducksEliminated;

                completedWord.element.classList.add('destroyed');
                const index = activeWords.indexOf(completedWord);
                if (index > -1) activeWords.splice(index, 1);
                setTimeout(() => completedWord.element.remove(), 300);

                inputBox.value = '';
                typedHighWaterMark = 0;
                handleInput();
            }
        }

        startBtn.addEventListener('click', runCountdownThenStart);
        restartBtn.addEventListener('click', () => {
             endScreen.classList.add('hidden');
             runCountdownThenStart();
        });
        inputBox.addEventListener('input', handleInput);

        function attemptRegister() {
            const fullName = document.getElementById('reg-fullname').value.trim();
            const studentId = document.getElementById('reg-studentid').value.trim();
            const registerError = document.getElementById('register-error');

            if (!fullName || !studentId) {
                registerError.classList.remove('hidden');
                return;
            }
            registerError.classList.add('hidden');

            playerNameDisplay.textContent = `ผู้เล่น: ${fullName} (${studentId})`;
            playerNameDisplay.classList.remove('hidden');

            registerScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        registerBtn.addEventListener('click', attemptRegister);
        ['reg-fullname', 'reg-studentid'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    attemptRegister();
                }
            });
        });
    </script>
